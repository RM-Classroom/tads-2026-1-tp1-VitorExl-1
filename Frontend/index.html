<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Central da Locadora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
    <div class="app-shell">
        <aside class="side-panel">
            <div>
                <p class="eyebrow mb-2">VendaVeiculosAPI</p>
                <h1 class="brand-title">Central da Locadora</h1>
                <p class="brand-copy">Frontend completo para CRUDs, filtros e consultas analiticas da API.</p>
            </div>

            <nav class="nav-grid" id="main-nav">
                <button class="nav-chip is-active nav-btn" data-view="home">Início</button>
                <button class="nav-chip nav-btn" data-view="clientes">Clientes</button>
                <button class="nav-chip nav-btn" data-view="fabricantes">Fabricantes</button>
                <button class="nav-chip nav-btn" data-view="veiculos">Veiculos</button>
                <button class="nav-chip nav-btn" data-view="vendas">Vendas</button>
                <button class="nav-chip nav-btn" data-view="alugueis">Alugueis</button>
                <button class="nav-chip nav-btn" data-view="consultas">Consultas</button>
            </nav>

        </aside>

        <main class="content-panel">
            <section class="hero-card">
                <div>
                    <p class="section-kicker">Trabalho pratico</p>
                    <h2 class="hero-title">Acesso por menu</h2>
                    <p class="hero-copy">Escolha uma seção no menu para abrir somente a funcionalidade desejada.</p>
                </div>
                <div class="hero-actions">
                    <a class="btn btn-dark" href="/swagger" target="_blank" rel="noreferrer">Abrir Swagger</a>
                    <button class="btn btn-outline-dark" data-jump="consultas">Ver consultas</button>
                </div>
            </section>

            <section id="app-content"></section>
        </main>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-stack"></div>

    <div class="modal" id="edit-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content edit-modal-shell">
                <div class="modal-header">
                    <div>
                        <p class="modal-kicker">Edição em modal</p>
                        <h3 class="modal-title fs-5" id="edit-modal-title">Editar registro</h3>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <form id="edit-form">
                    <div class="modal-body">
                        <div id="edit-form-fields" class="row g-3"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-dark">Salvar alterações</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/assets/js/app.js"></script>
</body>
</html>
